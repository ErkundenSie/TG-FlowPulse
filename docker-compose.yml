services:
  app:
    build: .
    image: tg-signpulse:local
    container_name: tg-signpulse
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    environment:
      - PORT=8080
      - APP_DATA_DIR=/data
      - TZ=${TZ:-Asia/Shanghai}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
